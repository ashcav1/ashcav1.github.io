<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery · Ashish Cavale</title>
  <meta name="description" content="Figures and animations from Ashish Cavale's research — Bennu gravity field estimation, LMGC90 granular simulations, and binary asteroid dynamics.">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <canvas id="starfield" aria-hidden="true"></canvas>

  <header class="site-header">
    <nav class="nav container">
      <a class="brand" href="index.html">Ashish Cavale</a>
      <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links" id="nav-links">
        <li><a href="index.html#research">Research</a></li>
        <li><a href="gallery.html" aria-current="page">Gallery</a></li>
        <li><a href="index.html#publications">Publications</a></li>
        <li><a href="index.html#about">About</a></li>
        <li><a href="index.html#contact">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="section container gallery-page">
      <h1 class="page-title">Gallery</h1>
      <p class="section-lede">
        Figures and animations from my research, organized by topic. Click an item to view
        it at full size.
      </p>

      <div class="filter-bar" id="filter-bar" role="toolbar" aria-label="Filter gallery by category">
        <!-- Filter chips populated from data/gallery-data.js -->
      </div>

      <div class="gallery-grid" id="gallery-grid">
        <!-- Cards populated from data/gallery-data.js -->
      </div>

      <p class="gallery-empty" id="gallery-empty" hidden>Nothing in this category yet.</p>
    </section>
  </main>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" hidden>
    <button class="lb-close" id="lb-close" aria-label="Close">✕</button>
    <button class="lb-prev" id="lb-prev" aria-label="Previous">‹</button>
    <figure class="lb-figure">
      <div class="lb-media" id="lb-media"></div>
      <figcaption>
        <h3 id="lb-title"></h3>
        <p id="lb-caption"></p>
        <p class="lb-meta" id="lb-meta"></p>
      </figcaption>
    </figure>
    <button class="lb-next" id="lb-next" aria-label="Next">›</button>
  </div>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>© <span id="year"></span> Ashish Cavale</p>
    </div>
  </footer>

  <script src="data/gallery-data.js"></script>
  <script src="js/starfield.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
